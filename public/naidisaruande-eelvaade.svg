<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Digiteekaardi eelhinnangu näidisaruanne</title>
  <desc id="desc">Näidisaruande eelvaade ettevõtte digiteekaardi toetuse esmaseks sobivuse hindamiseks.</desc>
  <rect width="1100" height="760" fill="#eef6f8"/>
  <rect x="78" y="54" width="944" height="652" rx="18" fill="#ffffff" stroke="#d9e3ea" stroke-width="2"/>
  <rect x="78" y="54" width="944" height="94" rx="18" fill="#10233f"/>
  <rect x="78" y="126" width="944" height="22" fill="#10233f"/>
  <text x="120" y="105" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Digitaliseerimise teekaardi eelhinnang</text>
  <text x="120" y="132" font-family="Inter, Arial, sans-serif" font-size="15" fill="#ccefed">Näidisaruande struktuur. Teie aruandes on teie ettevõtte andmed ja soovitus.</text>
  <text x="852" y="103" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#d6a642">Digiteekaart.ee</text>

  <text x="120" y="196" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f8b7a">1. Esmane sobivus</text>
  <rect x="120" y="220" width="284" height="118" rx="10" fill="#f7f9fb" stroke="#d9e3ea"/>
  <text x="144" y="258" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="900" fill="#0f8b7a">72</text>
  <text x="208" y="254" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#142033">/ 100</text>
  <text x="144" y="292" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#10233f">Tasub edasi vaadata</text>
  <text x="144" y="318" font-family="Inter, Arial, sans-serif" font-size="14" fill="#627085">Vaja kontrollida käivet ja omafinantseeringut.</text>

  <rect x="430" y="220" width="284" height="118" rx="10" fill="#f7f9fb" stroke="#d9e3ea"/>
  <text x="454" y="258" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#10233f">Tugev külg</text>
  <text x="454" y="292" font-family="Inter, Arial, sans-serif" font-size="15" fill="#627085">Ettevõttel on korduvad tööd, mida on mõistlik lihtsustada.</text>
  <rect x="454" y="310" width="206" height="10" rx="5" fill="#d9e3ea"/>
  <rect x="454" y="310" width="158" height="10" rx="5" fill="#0f8b7a"/>

  <rect x="740" y="220" width="184" height="118" rx="10" fill="#fff9ea" stroke="#e7d2a2"/>
  <text x="764" y="258" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#10233f">Puuduv info</text>
  <text x="764" y="292" font-family="Inter, Arial, sans-serif" font-size="15" fill="#627085">Majandusaasta andmed</text>
  <text x="764" y="318" font-family="Inter, Arial, sans-serif" font-size="15" fill="#627085">ja VTA jääk.</text>

  <text x="120" y="390" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f8b7a">2. Mida enne taotlust kontrollida</text>
  <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#142033">
    <circle cx="132" cy="428" r="6" fill="#0f8b7a"/>
    <text x="152" y="434">Kas kahe eelmise majandusaasta keskmine müügitulu ületab nõutud piiri?</text>
    <circle cx="132" cy="470" r="6" fill="#0f8b7a"/>
    <text x="152" y="476">Kas ettevõttel on omafinantseeringuks realistlik plaan?</text>
    <circle cx="132" cy="512" r="6" fill="#d6a642"/>
    <text x="152" y="518">Kas digitaliseerimise kitsaskohad on piisavalt konkreetsed?</text>
    <circle cx="132" cy="554" r="6" fill="#d6a642"/>
    <text x="152" y="560">Kas VTA ehk vähese tähtsusega abi jääk vajab üle kontrollimist?</text>
  </g>

  <rect x="120" y="604" width="804" height="54" rx="10" fill="#10233f"/>
  <text x="144" y="638" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Soovitus: tehke 15-min kõne ja koguge enne otsust 4 dokumenti kokku.</text>
  <text x="144" y="682" font-family="Inter, Arial, sans-serif" font-size="13" fill="#627085">Märkus: eelhinnang ei ole EIS-i ametlik otsus. See aitab otsustada, kas edasi liikumine on mõistlik.</text>
</svg>
